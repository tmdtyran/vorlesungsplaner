<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Vorlesungsplaner</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        #status {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }
        #error { color: #f87171; white-space: pre-wrap; margin-top: 1rem; font-size: 0.85rem; }
        #app-frame {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="status">
        <p>Vorlesungsplaner wird gestartet…</p>
        <div id="error"></div>
    </div>
    <iframe id="app-frame" title="Vorlesungsplaner"></iframe>

    <script src="/neutralino.js"></script>
    <script src="/app.js"></script>
</body>
</html>
