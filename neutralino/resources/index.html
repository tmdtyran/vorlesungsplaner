<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <title>Vorlesungsplaner</title>
    <link rel="icon" href="data:," />
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }
        #status {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }
        #error {
            color: #94a3b8;
            white-space: pre-wrap;
            text-align: left;
            margin-top: 1.5rem;
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            font-size: 0.75rem;
            max-width: 90vw;
            max-height: 60vh;
            overflow-y: auto;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }
        #app-frame {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="status">
        <p>Vorlesungsplaner wird gestartet…</p>
        <div id="error"></div>
    </div>
    <iframe id="app-frame" title="Vorlesungsplaner"></iframe>

    <script src="/neutralino.js"></script>
    <script src="/app.js"></script>
</body>
</html>
